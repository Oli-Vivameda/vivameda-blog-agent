name: Daily Blog Post

on:
  schedule:
    # Runs every day at 07:00 UTC (09:00 Cyprus time)
    - cron: "0 7 * * *"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BLOG_OUTPUT_DIR: "./output"
        run: python blog_agent.py --publish

      - name: Commit and push new post
        run: |
          git config user.name "Vivameda Blog Agent"
          git config user.email "blog-agent@vivameda.com"
          git add output/
          # Only commit if there are changes
          git diff --staged --quiet || {
            git commit -m "📝 Daily blog post - $(date +%Y-%m-%d)"
            git push
          }
