name: Daily Blog Post

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BLOG_OUTPUT_DIR: "./output"
        run: python blog_agent.py

      - name: Commit and push new post
        run: |
          git config user.name "Vivameda Blog Agent"
          git config user.email "blog-agent@vivameda.com"
          git add output/
          git diff --staged --quiet || {
            git commit -m "Daily blog post - $(date +%Y-%m-%d)"
            git push
          }

      - name: WhatsApp success
        if: success()
        run: |
          MSGS=("Fresh+blog+post+just+dropped+on+vivameda.com.+You+didn't+even+have+to+wake+up." "Blog+is+live.+Another+banger+nobody+asked+for+but+everyone+needs." "New+post+on+the+site.+Your+content+machine+never+sleeps." "Blog+done.+Published.+SEO+juice+flowing.+You're+welcome+boss.")
          MSG=${MSGS[$RANDOM % ${#MSGS[@]}]}
          curl -s "https://api.callmebot.com/whatsapp.php?phone=4915129005414&text=$MSG&apikey=5944134"

      - name: WhatsApp failure
        if: failure()
        run: |
          curl -s "https://api.callmebot.com/whatsapp.php?phone=4915129005414&text=Yo.+Blog+agent+crashed.+No+post+today+unless+you+fix+this.+Check+GitHub+Actions.&apikey=5944134"
